services:
  - type: web
    name: portfolio-backend
    runtime: node
    region: singapore          # closest to India — change to: oregon / frankfurt / ohio
    plan: free                 # free tier (spins down after 15 min idle)
    rootDir: .                 # repo root = backend folder
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false            # set manually in Render dashboard
      - key: JWT_SECRET
        sync: false            # set manually in Render dashboard
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: ADMIN_EMAIL
        sync: false            # set manually in Render dashboard
      - key: ADMIN_PASSWORD
        sync: false            # set manually in Render dashboard
      - key: FRONTEND_URL
        sync: false            # set to your Vercel URL after deploying frontend
